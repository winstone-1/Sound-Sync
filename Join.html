<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex items-center justify-center min-h-screen bg-slate-950 px-4">
  <div class="w-full max-w-md">
    <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800 shadow-2xl rounded-3xl p-10">
      
      <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 mb-4 shadow-lg shadow-purple-500/20">
             <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19V6l12-3v13M9 19c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zm12-3c0 1.105-1.343 2-3 2s-3-.895-3-2 1.343-2 3-2 3 .895 3 2zM9 10l12-3"></path></svg>
        </div>
        <h2 class="text-3xl font-extrabold text-white tracking-tight">Welcome Back</h2>
        <p class="text-slate-400 text-sm mt-2">Ready to sync your sound?</p>
      </div>

      <form>
        <div class="mb-6">
          <label class="block text-slate-300 text-xs font-semibold uppercase tracking-wider mb-2" for="username">
            Username
          </label>
          <input class="w-full bg-slate-800 border-none rounded-xl py-3 px-4 text-white placeholder-slate-500 focus:ring-2 focus:ring-purple-500 transition-all outline-none" id="username" type="text" placeholder="Enter your username">
        </div>

        <div class="mb-8">
          <div class="flex justify-between items-center mb-2">
            <label class="block text-slate-300 text-xs font-semibold uppercase tracking-wider" for="password">
              Password
            </label>
            <a class="text-xs font-medium text-purple-400 hover:text-purple-300 transition-colors" href="#">
              Forgot?
            </a>
          </div>
          <input class="w-full bg-slate-800 border-none rounded-xl py-3 px-4 text-white placeholder-slate-500 focus:ring-2 focus:ring-purple-500 transition-all outline-none" id="password" type="password" placeholder="••••••••">
        </div>

        <button class="w-full py-4 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold rounded-xl shadow-xl shadow-purple-900/20 active:scale-95 transition-transform" type="button">
          Sign In
        </button>
      </form>

      <p class="text-center mt-8 text-slate-400 text-sm">
        New to the rhythm? <a href="#" class="text-white font-bold hover:underline">Join Now</a>
      </p>
    </div>

    <p class="text-center text-slate-600 text-xs mt-8">
      &copy;2026 SoundSync. Mastering your experience.
    </p>
  </div>
</div>
</body>
</html>
